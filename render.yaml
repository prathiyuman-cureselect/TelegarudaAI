services:
  # Backend FastAPI Service
  - type: web
    name: rppg-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free # or standard if you need more resources for dlib
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000

  # Frontend Vite Service
  - type: static
    name: rppg-frontend
    buildCommand: npm run build:frontend
    publishPath: frontend/dist
    envVars:
      - key: VITE_WS_URL
        value: wss://telegaruda-kee-ai.onrender.com/ws/scan
